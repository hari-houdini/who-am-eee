<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bun</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./global.css">
</head>

<body>

  <div ref="{{ rootRef }}" class="layout">
    <div class="layout__container">

      <template id="terminal-window-template">
        <div data-win="hero" data-grav="1" data-rot="-0.5" data-screen-label="hero.exe" class="terminal">
          <div class="terminal__titlebar">
            <span class="terminal__dot terminal__dot--close"></span>
            <span class="terminal__dot terminal__dot--minimize"></span>
            <span class="terminal__dot terminal__dot--maximize"></span>
            <span class="terminal__titlebar-label">hero.exe — Not Responding</span>
          </div>
          <div class="terminal__content">
            <div class="terminal__status">
              &gt; portfolio.load() &nbsp;... &nbsp;ERROR:succeeded unexpectedly
            </div>
            {{ heroHeadline }}
            <div class="terminal__tagline">// escape artist. of deadlines, mostly. <span class="terminal__cursor"></span>
            </div>
            <div class="dialog">
              <div class="dialog__titlebar">
                <span>Fatal recruitment error</span><span>✕</span>
              </div>
              <div class="dialog__body">
                <div class="dialog__icon">⚠️</div>
                <div>This portfolio has encountered a visitor.<br>Hire anyway?</div>
              </div>
              <div class="dialog__actions">
                <div data-mag="1" class="dialog__button">
                  {{ heroLeftLabel }}
                </div>
                <div data-mag="1" class="dialog__button dialog__button--focused">
                  {{ heroRightLabel }}
                </div>
              </div>
            </div>
          </div>
          <div class="terminal__hazard">
            <span class="terminal__hazard-label">
              UNDER NO CONSTRUCTION
            </span>
          </div>
        </div>
      </template>

      <terminal-window></terminal-window>

    </div>
  </div>

  <script type="module" src="./dist/src/main.js" defer></script>
</body>

</html>

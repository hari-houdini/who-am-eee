<div class="terminal">
  <div class="terminal__titlebar">
    <span class="terminal__dot terminal__dot--close"></span>
    <span class="terminal__dot terminal__dot--minimize"></span>
    <span class="terminal__dot terminal__dot--maximize"></span>
    <span class="terminal__titlebar-label">~/harihoudini — zsh</span>
  </div>
  <div class="terminal__content">
    <div class="terminal__status">
      $ whoami
      <span class="terminal__cursor" aria-hidden="true"></span>
    </div>
    <slot name="terminal-output"></slot>
    <div class="terminal__tagline">Senior Web Engineer · TypeScript · AWS</div>
    <div class="terminal__hazard" aria-hidden="true">
      <span class="terminal__hazard-label">⚠ CRITICAL SKILL ISSUE DETECTED ⚠</span>
    </div>
    <div
      class="dialog"
      role="alertdialog"
      aria-labelledby="dialog-title"
      aria-describedby="dialog-body"
    >
      <div class="dialog__titlebar">
        <span id="dialog-title" class="dialog__title">Fatal Error</span>
      </div>
      <div class="dialog__body" id="dialog-body">
        <span class="dialog__icon" aria-hidden="true">⚠</span>
        <span>
          Fatal error: Too many side projects, not enough shipping.
          The system will now proceed to LinkedIn.
        </span>
      </div>
      <div class="dialog__actions">
        <button class="dialog__button dialog__button--focused" type="button">OK</button>
        <button class="dialog__button" type="button">Cancel</button>
      </div>
    </div>
  </div>
</div>
